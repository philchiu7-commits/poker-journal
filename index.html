<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Poker Journal</title>
<meta name="theme-color" content="#0f1115">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Journal">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>

<!-- ===== Opponents list ===== -->
<section id="view-opponents">
  <header class="vhead">
    <h1>Opponents</h1>
    <button id="opp-add" class="iconbtn" title="New opponent">＋</button>
  </header>
  <input id="opp-search" type="search" placeholder="Search name, look…" autocomplete="off">
  <div id="opp-new" class="panel hidden">
    <input id="opp-new-name" placeholder="Name / nickname" autocomplete="off">
    <input id="opp-new-group" placeholder="Group (e.g. Friday game)" list="groups" autocomplete="off">
    <button id="opp-new-save" class="primary">Add opponent</button>
  </div>
  <div id="opp-list" class="list"></div>
</section>

<!-- ===== Opponent detail ===== -->
<section id="view-opp" class="hidden">
  <header class="vhead">
    <button class="backbtn" data-back>‹</button>
    <h1 id="od-name"></h1>
    <button id="od-edit" class="iconbtn" title="Edit">✎</button>
  </header>
  <div id="od-meta" class="muted sub2"></div>
  <div id="od-editform" class="panel hidden">
    <input id="od-e-name" placeholder="Name" autocomplete="off">
    <input id="od-e-group" placeholder="Group" list="groups" autocomplete="off">
    <input id="od-e-physical" placeholder="Looks like… (for re-identifying)" autocomplete="off">
    <div class="row">
      <button id="od-e-save" class="primary">Save</button>
      <button id="od-e-del" class="danger">Delete</button>
    </div>
  </div>
  <div class="panel">
    <div class="ptitle">Reads</div>
    <div id="od-tags"></div>
  </div>
  <div class="panel">
    <div class="ptitle">Exploits</div>
    <div class="noterow">
      <textarea id="od-exploit" rows="1" placeholder="How to beat this player…"></textarea>
      <button id="od-exploit-add" class="secondary">Add</button>
    </div>
    <div id="od-exsugg" class="list"></div>
    <div id="od-exploits" class="list"></div>
  </div>
  <div class="panel">
    <div class="ptitle">Notes</div>
    <div class="noterow">
      <textarea id="od-note" rows="1" placeholder="Add a note…"></textarea>
      <button id="od-note-add" class="secondary">Add</button>
    </div>
    <div id="od-notes" class="list"></div>
  </div>
  <div class="panel">
    <div class="ptitle">Hands</div>
    <div id="od-hands" class="list"></div>
  </div>
</section>

<!-- ===== Hand entry ===== -->
<section id="view-hand" class="hidden">
  <div class="handline">
    <div id="he-line" class="linetext muted">New hand — tap a villain</div>
    <button id="he-undo" class="undobtn">Undo</button>
  </div>

  <div class="hgroup"><div id="he-mode" class="seg"></div></div>

  <div id="he-chipsonly">
    <div class="hgroup">
      <div class="glabel">Villains</div>
      <div id="he-villains" class="chiprow scroll"></div>
    </div>

    <div class="hgroup">
      <div class="posrow"><span class="poslabel">Hero</span><div id="he-heropos" class="chiprow tight"></div></div>
      <div id="he-vposrows"></div>
    </div>
  </div>

  <div id="he-table" class="hidden">
    <div id="he-felt"></div>
    <div id="he-seatassign"></div>
  </div>

  <div class="hgroup actionpad">
    <div id="he-street" class="seg"></div>
    <div id="he-pot" class="potline hidden"></div>
    <div id="he-actor" class="seg"></div>
    <div id="he-acts" class="actgrid"></div>
    <div id="he-sizes" class="chiprow hidden"></div>
  </div>

  <div class="hgroup">
    <div class="glabel">Board &amp; cards</div>
    <div id="he-cards" class="cardsrow"></div>
  </div>

  <div class="hgroup">
    <textarea id="he-note" rows="1" placeholder="What happened…"></textarea>
  </div>

  <div class="hgroup stackrow">
    <span class="glabel">Blinds</span>
    <span class="kfield"><input id="he-sb" type="number" placeholder="SB" inputmode="numeric"><i>K</i></span>
    <span class="kfield"><input id="he-bb" type="number" placeholder="BB" inputmode="numeric"><i>K</i></span>
    <span class="kfield"><input id="he-std" type="number" placeholder="STD" inputmode="numeric"><i>K</i></span>
  </div>

  <div class="hgroup stackrow">
    <span class="glabel">Eff. stack</span>
    <span class="kfield"><input id="he-effstack" type="number" placeholder="stack" inputmode="numeric"><i>K</i></span>
  </div>

  <div class="hgroup">
    <div class="posrow"><span class="poslabel">🦑 Have</span><div id="he-squidhave" class="chiprow tight scroll"></div></div>
    <div class="posrow"><span class="poslabel">🦑 Left</span><div id="he-squidleft" class="chiprow tight scroll"></div></div>
  </div>

  <div class="savebar">
    <button id="he-save" class="primary">Save</button>
    <button id="he-savenext" class="secondary">Save &amp; next</button>
  </div>
</section>

<!-- ===== Hands feed ===== -->
<section id="view-hands" class="hidden">
  <header class="vhead"><h1>Hands</h1></header>
  <div id="hands-list" class="list"></div>
</section>

<!-- ===== Hand detail ===== -->
<section id="view-handview" class="hidden">
  <header class="vhead">
    <button class="backbtn" data-back>‹</button>
    <h1>Hand</h1>
    <button id="hv-edit" class="iconbtn" title="Edit">✎</button>
  </header>
  <div id="hv-text" class="handview"></div>
  <button id="hv-delete" class="danger">Delete hand</button>
</section>

<!-- ===== Data / backup ===== -->
<section id="view-data" class="hidden">
  <header class="vhead"><h1>Data</h1></header>
  <div class="panel">
    <div class="ptitle">Storage</div>
    <div id="data-storage" class="muted sub2"></div>
  </div>
  <div class="panel">
    <div class="ptitle">Backup</div>
    <div id="data-backupnag" class="muted sub2"></div>
    <div class="row">
      <button id="data-export" class="secondary">Export JSON</button>
      <button id="data-import" class="secondary">Import JSON</button>
    </div>
    <input id="data-importfile" type="file" accept=".json,application/json" class="hidden">
  </div>
  <div id="data-stats" class="panel muted sub2"></div>
</section>

</main>

<datalist id="groups"></datalist>

<nav id="tabbar">
  <button data-tab="opponents"><span class="ticon">☺</span>Opponents</button>
  <button data-tab="hand" class="bigtab"><span class="ticon">＋</span>Hand</button>
  <button data-tab="hands"><span class="ticon">≡</span>Hands</button>
  <button data-tab="data"><span class="ticon">⇅</span>Data</button>
</nav>

<div id="sheet-backdrop" class="hidden"></div>
<div id="sheet" class="hidden"></div>
<div id="toast" class="hidden"></div>

<script src="vocab.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
</body>
</html>
